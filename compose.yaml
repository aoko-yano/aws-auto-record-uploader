services:
  audio-uploader:
    build: .
    container_name: aws-audio-uploader
    env_file:
      - ./.env
    volumes:
      # ソースフォルダをマウント（Windows側でコピーしたフォルダ）
      - "${SOURCE_COPY_FOLDER:-./usb_copy}:/mnt/source:ro"
      # 設定ファイルをマウント
      - ./config.json:/app/config.json:ro
      # 一時フォルダ用（書き込み可能）
      - "${TEMP_FOLDER:-./temp_uploads}:/app/temp_uploads"
      # Whisperモデルキャッシュ（永続化）
      - "${MODEL_CACHE_FOLDER:-./model_cache}:/root/.cache/huggingface"
    environment:
      - SOURCE_FOLDER=/mnt/source
      - TEMP_FOLDER_PATH=/app/temp_uploads
    command: ["-c", "/app/config.json"]
    restart: "no"
